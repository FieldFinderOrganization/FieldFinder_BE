spring.application.name=FieldFinder
server.error.include-message=always
server.forward-headers-strategy=framework

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true

spring.data.mongodb.uri=mongodb+srv://triet172004_db_user:${MONGO_DB_PASSWORD}@fieldfinder.jgtptcb.mongodb.net/FieldFinder?retryWrites=true&w=majority
spring.data.mongodb.database=FieldFinder

payos.endpoint=https://api-merchant.payos.vn
payos.clientId=${YOUR_CLIENT_ID}
payos.apiKey=${YOUR_API_KEY}
payos.cancelUrl=http://localhost:3000/payment-cancel
payos.returnUrl=http://localhost:3000/payment-success
payos.checksumKey=${YOUR_CHECKSUM_KEY}
front_end_url=http://localhost:3000

weather_api_key=${WEATHER_API_KEY}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=triet172004@gmail.com
spring.mail.password=${MAIL_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-swallow-size=100MB

spring.cache.type=redis
spring.cache.redis.time-to-live=600000

