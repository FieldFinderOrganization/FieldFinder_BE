spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.redis.redisson.file=classpath:redisson-local.yml

spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=2000ms
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.multiplier=2

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

jwt.secret=${JWT_SECRET}
jwt.access-token-ttl-seconds=1800
jwt.refresh-token-ttl-seconds=2592000

google.client-id=${GOOGLE_CLIENT_ID}

facebook.app-id=${FACEBOOK_APP_ID}
facebook.app-secret=${FACEBOOK_APP_SECRET}

passkey.rp-id=localhost
passkey.rp-name=FieldFinder
passkey.rp-origin=http://localhost:8080