services:
  app:
    image: ${BE_IMAGE:-fieldfinder-be:local}
    build: .
    container_name: fieldfinder_be
    restart: on-failure
    ports:
      - "8080:8080"
    depends_on:
      redis-master:
        condition: service_started
      rabbitmq:
        condition: service_started
      mongo:
        condition: service_started
      ml:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - spring.data.redis.host=redis-master
      - spring.data.redis.port=6379
      - spring.data.redis.connect-timeout=3000
      - spring.data.redis.timeout=3000
      - SPRING_DATA_REDIS_CONNECT_TIMEOUT=3000
      - SPRING_DATA_REDIS_TIMEOUT=3000
      - SPRING_REDIS_REDISSON_FILE=classpath:redisson-docker-standalone.yml
      - SPRING_RABBITMQ_HOST=rabbitmq
      - ML_API_BASE_URL=http://ml:8000
      - ML_API_ENABLED=true
      - OSRM_BASE_URL=http://osrm:5000
      - OSRM_ENABLED=true
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ml:
    image: ${ML_IMAGE:-fieldfinder-ml:local}
    build:
      context: ./ml
      dockerfile: ${ML_DOCKERFILE:-Dockerfile.gpu}
    container_name: fieldfinder_ml
    restart: on-failure
    ports:
      - "8000:8000"
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - PYTHONUNBUFFERED=1
      - TORCH_DEVICE=cuda
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=fieldfinder
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  osrm:
    image: osrm/osrm-backend:latest
    container_name: fieldfinder_osrm
    ports:
      - "5000:5000"
    volumes:
      - ./osrm-data:/data
    command: osrm-routed --algorithm mld /data/vietnam-latest.osrm
    restart: on-failure

  redis-master:
    image: redis:7-alpine
    container_name: redis-master
    ports:
      - "6379:6379"
    command: redis-server --bind 0.0.0.0 --protected-mode no --appendonly yes
    volumes:
      - redis_data:/data
    restart: always

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared_tunnel
    command: tunnel --protocol http2 --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: always
    depends_on:
      - app

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: fieldfinder_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
      - "61613:61613"
    command: /bin/sh -c "rabbitmq-plugins enable --offline rabbitmq_stomp && rabbitmq-server"
    restart: always

  mongo:
    image: mongo:latest
    container_name: fieldfinder_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

  coturn:
    image: coturn/coturn:latest
    container_name: fieldfinder_coturn
    restart: always
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      # ~100 relay port (≈50 cuộc relay đồng thời). KHÔNG nới quá lớn ở chế độ
      # bridge: mỗi port = 1 docker-proxy → start chậm/nặng. Production dùng
      # network_mode: host + dải đầy đủ (49152-65535), bỏ phần ports: này.
      - "49152-49251:49152-49251/udp"
    command: >
      -n
      --listening-port=3478
      --min-port=49152 --max-port=49251
      --use-auth-secret
      --static-auth-secret=${TURN_SECRET:-fieldfinder-turn-secret}
      --realm=${TURN_REALM:-fieldfinder}
      --no-tls --no-dtls --fingerprint
      --log-file=stdout --no-cli

volumes:
  mongo_data:
  redis_data:
