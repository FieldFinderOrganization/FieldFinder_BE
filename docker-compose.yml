  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: fieldfinder_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
      - "61613:61613"
    command: /bin/sh -c "rabbitmq-plugins enable --offline rabbitmq_stomp && rabbitmq-server"
    restart: always

  mongo:
    image: mongo:latest
    container_name: fieldfinder_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

volumes:
  mongo_data: