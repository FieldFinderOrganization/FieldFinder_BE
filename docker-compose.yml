services:
  app:
    build: .
    container_name: fieldfinder_be
    restart: on-failure
    ports:
      - "8080:8080"
    depends_on:
      - redis-master
#      - redis-sentinel-1
#      - redis-sentinel-2
#      - redis-sentinel-3
      - rabbitmq
      - mongo
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env
    environment:
      # Chạy Redis Sentinel
#      - SPRING_DATA_REDIS_SENTINEL_MASTER=mymaster
#      - SPRING_DATA_REDIS_SENTINEL_NODES=redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      - spring.data.redis.host=127.0.0.1
      - spring.data.redis.port=6379
      - spring.data.redis.connect-timeout=3000
      - spring.data.redis.timeout=3000
      - SPRING_DATA_REDIS_CONNECT_TIMEOUT=3000
      - SPRING_DATA_REDIS_TIMEOUT=3000
      # Chạy Redis Sentinel
#      - SPRING_REDIS_REDISSON_FILE=classpath:redisson-docker.yml
      - SPRING_REDIS_REDISSON_FILE=classpath:redisson-local.yml
      - SPRING_RABBITMQ_HOST=rabbitmq

  redis-master:
    image: redis:7-alpine
    container_name: redis-master
    ports:
      - "6379:6379"
    # Thêm bind và tắt protected-mode
    command: redis-server --bind 0.0.0.0 --protected-mode no --appendonly yes
    restart: always

