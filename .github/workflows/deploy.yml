name: CI/CD FieldFinder

on:
  push:
    branches: ["main"]

jobs:
  build-be:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Firebase Config
        run: |
          mkdir -p src/main/resources/firebase
          echo "${{ secrets.FIREBASE_CONFIG }}" | base64 -d > src/main/resources/firebase/serviceAccountKey.json

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push BE image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: minhtriet004/fieldfinder-be:latest

  build-ml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ML image
        uses: docker/build-push-action@v5
        with:
          context: ./ml
          push: true
          tags: minhtriet004/fieldfinder-ml:latest

  deploy:
    needs: [build-be, build-ml]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.HOST_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/FieldFinder_BE
            # Rewrite compose: BE build → image
            sed -i 's|build: \.|image: minhtriet004/fieldfinder-be:latest|' docker-compose.yml
            # Rewrite compose: ML build context → image
            sed -i '/^  ml:/,/^  [a-z]/ { s|build:.*|image: minhtriet004/fieldfinder-ml:latest|; /context:/d; /dockerfile:/d; }' docker-compose.yml
            # Pull + restart both
            sudo docker compose pull app ml
            sudo docker compose up -d app ml
