name: CI/CD FieldFinder

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Firebase Config
        run: |
          mkdir -p src/main/resources/firebase
          echo "${{ secrets.FIREBASE_CONFIG }}" | base64 -d > src/main/resources/firebase/serviceAccountKey.json

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: minhtriet004/fieldfinder-be:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.HOST_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/FieldFinder_BE
            # Cập nhật file docker-compose.yml (chỉ có tác dụng ở lần đầu tiên)
            sed -i 's/build: ./image: minhtriet004\/fieldfinder-be:latest/' docker-compose.yml
            # Kéo ảnh mới và khởi động lại
            sudo docker compose pull app
            sudo docker compose up -d app
