name: CI/CD SportsHub

on:
  push:
    branches: ["main"]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      be: ${{ steps.filter.outputs.be }}
      ml: ${{ steps.filter.outputs.ml }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ml:
              - 'ml/**'
            be:
              - 'src/**'
              - 'pom.xml'
              - 'mvnw'
              - '.mvn/**'
              - 'Dockerfile'

  build-be:
    needs: changes
    if: needs.changes.outputs.be == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Firebase Config
        run: |
          mkdir -p src/main/resources/firebase
          echo "${{ secrets.FIREBASE_CONFIG }}" | base64 -d > src/main/resources/firebase/serviceAccountKey.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push BE image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: minhtriet004/fieldfinder-be:latest
          cache-from: type=gha,scope=be
          cache-to: type=gha,mode=max,scope=be

  build-ml:
    needs: changes
    if: needs.changes.outputs.ml == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ML GPU image
        uses: docker/build-push-action@v5
        with:
          context: ./ml
          file: ./ml/Dockerfile.gpu
          push: true
          tags: minhtriet004/fieldfinder-ml:latest
          cache-from: type=gha,scope=ml
          cache-to: type=gha,mode=max,scope=ml

  deploy:
    needs: [build-be, build-ml]
    if: always() && !cancelled() && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.HOST_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          script: |
            cd ~/FieldFinder_BE
            git pull origin main
            # Set image tags via env (compose dùng ${BE_IMAGE} / ${ML_IMAGE})
            export BE_IMAGE=minhtriet004/fieldfinder-be:latest
            export ML_IMAGE=minhtriet004/fieldfinder-ml:latest
            # Pull image mới từ Hub
            sudo -E docker compose pull app ml
            # Restart với image mới
            sudo -E docker compose up -d app ml
            # Prune image cũ tiết kiệm disk
            sudo docker image prune -f
